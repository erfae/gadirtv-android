<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #back {
      position: fixed;
      top: 22px;
      left: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px 10px 14px;
      background: rgba(220, 38, 38, 0.92);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      font-family: "Outfit", -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 220ms ease, transform 220ms ease, background 150ms ease;
      pointer-events: none;
      z-index: 999999;
    }
    body.show-ui #back {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #back:hover { background: rgba(255, 60, 60, 1); }
    #back svg { width: 18px; height: 18px; }

    #hint {
      position: fixed;
      top: 32px;
      right: 30px;
      color: rgba(255, 255, 255, 0.7);
      font-family: "Outfit", -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }
    body.show-ui #hint { opacity: 1; }
    #hint kbd {
      padding: 1px 6px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <button id="back" aria-label="Volver" title="Volver (Esc / Retroceso)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </button>
  <div id="hint">Pulsa <kbd>Esc</kbd> para volver</div>

  <script>
    const body = document.body;
    const btn = document.getElementById('back');
    let hideTimer = null;
    let currentlyBlocked = null; // null | true | false

    function showUi() {
      body.classList.add('show-ui');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => body.classList.remove('show-ui'), 3000);
    }

    // Detect if a screen coordinate falls inside the visible back button.
    // If yes → we must intercept mouse (setIgnoreMouseEvents false).
    // If not → let mpv OSC receive the click (setIgnoreMouseEvents true).
    function isInsideBackButton(x, y) {
      if (!body.classList.contains('show-ui')) return false;
      const r = btn.getBoundingClientRect();
      // Grow the hit-box a bit so users don't have to be pixel-perfect.
      const pad = 8;
      return x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad;
    }

    function setBlocking(shouldBlock) {
      if (currentlyBlocked === shouldBlock) return;
      currentlyBlocked = shouldBlock;
      if (window.gadirPlayer && window.gadirPlayer.setIgnoreMouse) {
        // ignore=true → mouse events pass through to mpv (OSC works).
        // ignore=false → this overlay window intercepts (button clickable).
        window.gadirPlayer.setIgnoreMouse(!shouldBlock);
      }
    }

    // Reveal button on any movement / key press.
    showUi();
    setBlocking(false);

    window.addEventListener('mousemove', (e) => {
      showUi();
      setBlocking(isInsideBackButton(e.clientX, e.clientY));
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      showUi();
      if (e.key === 'Escape' || e.key === 'Backspace') {
        e.preventDefault();
        goBack();
      }
    });

    function goBack() {
      if (window.gadirPlayer && window.gadirPlayer.back) {
        window.gadirPlayer.back();
      }
    }
    btn.addEventListener('click', goBack);
  </script>
</body>
</html>
