plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '1' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '1.0' }

// Optional release-signing config. If /android/key.properties exists (either
// committed by the user or generated by CI), we sign the release APK with
// that keystore. Otherwise we transparently fall back to the debug key so
// the app is still installable via sideload.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.gadir.tv"
    compileSdk 35
    ndkVersion "26.3.11579264"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.gadir.tv"
        // Lowered to 21 so old TV boxes (Android 5-6) also install. Cronet
        // is declared minSdk 24 in its manifest; we override at merge time
        // and gracefully fall back to IOClient on devices where Cronet is
        // unavailable at runtime.
        minSdkVersion 21
        targetSdkVersion 33
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        debug {
            // Algunos firmwares Android TV antiguos (Sony Bravia, Amlogic)
            // rechazan APKs firmados solo con esquema v3/v4.
            v1SigningEnabled true
            v2SigningEnabled true
        }
        if (hasKeystore) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
                if (keystoreProperties['storeType']) {
                    storeType keystoreProperties['storeType']
                }
                // Enable legacy signing schemes (v1 JAR + v2 APK signature).
                // Some Sony Bravia and other older Android TV firmwares reject
                // packages that only carry the modern v3/v4 signatures.
                v1SigningEnabled true
                v2SigningEnabled true
                enableV3Signing true
                enableV4Signing false
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    // NOTE: no `splits { abi }` block — usamos `flutter build apk
    // --target-platform=android-arm64` que produce un `app-release.apk`
    // limpio. Añadir `splits` rompe la búsqueda de salida de Flutter.

    // flutter_vlc_player (libVLC) ships its own libc++_shared.so which
    // conflicts with other native plugins (cronet_http, etc.). Tell the
    // packager to just pick the first copy — they are ABI-compatible.
    packagingOptions {
        pickFirst 'lib/**/libc++_shared.so'
        pickFirst 'lib/**/libjsc.so'
        // Force extracted native libs. Some older Android TV box
        // firmwares (Amlogic S905/S912 / Xiaomi Mi TV Box) fail to
        // install APKs whose .so files are packed uncompressed, which
        // is the AGP 8 default. Extracting on install produces the
        // classic /data/data/.../lib layout every device supports.
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
