plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '1' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '1.0' }

// Optional release-signing config. If /android/key.properties exists (either
// committed by the user or generated by CI), we sign the release APK with
// that keystore. Otherwise we transparently fall back to the debug key so
// the app is still installable via sideload.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.gadir.tv"
    compileSdk 34
    ndkVersion "26.3.11579264"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.gadir.tv"
        // cronet_http requires minSdk 24 (Android 7.0+)
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasKeystore) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
                if (keystoreProperties['storeType']) {
                    storeType keystoreProperties['storeType']
                }
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    // Ship one APK per ABI so users of ARM devices don't download the x86
    // native libs (libmpv weighs ~15 MB per ABI).
    // NOTE: only applies to RELEASE builds — `flutter build apk --debug`
    // expects a single `app-debug.apk`, not split by ABI.
    splits {
        abi {
            enable gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }
            reset()
            // Solo arm64-v8a — cubre el 99% de dispositivos Android modernos
            // (móviles/TV boxes desde 2017) y evita el fallo del CI cuando
            // Flutter espera múltiples APKs.
            include 'arm64-v8a'
            universalApk false
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
