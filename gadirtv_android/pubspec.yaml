name: gadirtv
description: GadirTV — Xtream Codes IPTV client for Android (Mobile + TV).
publish_to: 'none'
version: 0.2.2+4

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.7.0

  # Local persistence (equivalent to localStorage in the React app)
  shared_preferences: ^2.3.3

  # Simple state management
  provider: ^6.1.2

  # Router
  go_router: ^14.6.2

  # Image cache for posters / covers
  cached_network_image: ^3.4.1

  # Video player based on libmpv — full MPEG-TS / AC3 / EAC3 / HEVC support
  media_kit: 1.1.11
  media_kit_video: 1.2.5
  media_kit_libs_android_video: 1.3.6

  cupertino_icons: ^1.0.8

# Pin transitive deps whose newer versions target Flutter > 3.24 and break
# the Gradle build with `flutter.compileSdkVersion` errors.
dependency_overrides:
  package_info_plus: 8.1.4
  package_info_plus_platform_interface: 3.0.1
  wakelock_plus: 1.2.8
  wakelock_plus_platform_interface: 1.2.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
