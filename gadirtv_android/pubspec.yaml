name: gadirtv
description: GadirTV — Xtream Codes IPTV client for Android (Mobile + TV).
publish_to: 'none'
version: 2.3.6+59

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.7.0
  http: ^1.2.2

  # Local persistence (equivalent to localStorage in the React app)
  shared_preferences: ^2.3.3

  # Simple state management
  provider: ^6.1.2

  # Router
  go_router: ^14.6.2

  # Image cache for posters / covers
  cached_network_image: ^3.4.1

  # Video player based on libVLC — mismo motor que XCIPTV Player, que es el
  # que funciona en Xiaomi TV Box (Amlogic) sin crashes. Soporta MPEG-TS,
  # AC3, EAC3, HEVC, MKV con aceleración hardware nativa.
  flutter_vlc_player: ^7.4.2

  # Video player — ExoPlayer (Android default, better image quality)
  video_player: ^2.9.2

  # Open trailers and external player intents
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

  # File picker for backup save / restore.
  file_picker: ^8.1.2
  # Platform-specific writable directories (used to place backup files).
  path_provider: ^2.1.4
  # Native share sheet — lets the user send the backup to Drive, Files,
  # WhatsApp, email, etc. after export.
  share_plus: ^10.1.2

# Pin transitive deps whose newer versions target Flutter > 3.24 and break
# the Gradle build with `flutter.compileSdkVersion` errors.
dependency_overrides:
  package_info_plus: 8.1.4
  package_info_plus_platform_interface: 3.0.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/gadirtv_logo.png
