name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release + Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Restore deferred-VLC plugin registrant (flutter pub get overwrites it)
        run: git checkout HEAD -- android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Verify plugin registrant matches pubspec (no stale media_kit refs)
        run: |
          REG=android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          if grep -q media_kit "$REG"; then
            echo "ERROR: $REG still references removed media_kit — run flutter pub get"
            exit 1
          fi
          if grep -q flutter_vlc_player "$REG"; then
            echo "ERROR: $REG must NOT auto-register flutter_vlc_player (deferred via MainActivity)"
            exit 1
          fi
          if grep -qE 'jni|cronet_http|media_kit' "$REG"; then
            echo "ERROR: $REG references jni/cronet/media_kit — run flutter pub get"
            exit 1
          fi

      - name: Build RELEASE APKs (uno por arquitectura — más pequeños, más fiables)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64,android-x64

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-split-apks
          path: gadirtv_android/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Build RELEASE APK universal (fallback si prefieres uno solo)
        run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-tv:
    name: Build APK Android TV / Google TV (dedicado)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore deferred-VLC plugin registrant (flutter pub get overwrites it)
        run: git checkout HEAD -- android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Verify plugin registrant matches pubspec (no stale media_kit refs)
        run: |
          REG=android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          if grep -q media_kit "$REG"; then
            echo "ERROR: $REG still references removed media_kit — run flutter pub get"
            exit 1
          fi
          if grep -q flutter_vlc_player "$REG"; then
            echo "ERROR: $REG must NOT auto-register flutter_vlc_player (deferred via MainActivity)"
            exit 1
          fi
          if grep -qE 'jni|cronet_http|media_kit' "$REG"; then
            echo "ERROR: $REG references jni/cronet/media_kit — run flutter pub get"
            exit 1
          fi

      - name: Swap in TV-only manifest (leanback required, no phone launcher)
        run: |
          cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.phone.backup.xml
          cp android/app/src/main/AndroidManifest.tv.xml android/app/src/main/AndroidManifest.xml

      - name: Build TV APK (arm64-v8a — Android TV / TV Box / Google TV)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Rename output
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV.apk
          if-no-files-found: error

      - name: Build TV DEBUG APK (arm64-v8a — muestra pantalla roja con stack trace si crashea)
        run: flutter build apk --debug --target-platform=android-arm64

      - name: Rename debug output
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG.apk

      - name: Upload TV DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-DEBUG-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG.apk
          if-no-files-found: error

  # Public GitHub Release so Android TV users can paste a direct URL into
  # the Downloader app (artifact zips from Actions are not usable there).
  publish-release:
    name: Publish GitHub Release (Downloader-friendly URL)
    needs: [build, build-tv]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from pubspec.yaml
        id: ver
        run: |
          V=$(grep '^version:' gadirtv_android/pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Download TV APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-AndroidTV-apk
          path: release-assets

      - name: Download universal APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-release-apk
          path: release-assets

      - name: Download arm64 phone APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-release-split-apks
          path: release-assets

      - name: Prepare release filenames
        run: |
          cd release-assets
          [ -f app-release.apk ] && mv app-release.apk GadirTV-universal.apk
          [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk GadirTV-arm64.apk
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: GadirTV ${{ steps.ver.outputs.version }}
          body: |
            ## Instalar con Downloader (Android TV / TV Box)

            1. Abre **Downloader** en tu TV
            2. Pega esta URL y pulsa **Go**:

            ```
            https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/GadirTV-AndroidTV.apk
            ```

            3. Cuando termine la descarga → **Install**
            4. En login debe aparecer **v${{ steps.ver.outputs.version }}**

            ## Otros APKs

            | Archivo | Dispositivo |
            |---------|-------------|
            | `GadirTV-AndroidTV.apk` | TV Box, Android TV, Google TV |
            | `GadirTV-arm64.apk` | Móvil/tablet arm64 |
            | `GadirTV-universal.apk` | Cualquier Android (más pesado) |
          files: release-assets/*
          make_latest: true
          overwrite_files: true
