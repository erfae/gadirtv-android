name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Release + Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build RELEASE APKs (uno por arquitectura — más pequeños, más fiables)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64,android-x64

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-split-apks
          path: gadirtv_android/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Build RELEASE APK universal (fallback si prefieres uno solo)
        run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-tv:
    name: Build APK Android TV / Google TV (dedicado)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Swap in TV-only manifest (leanback required, no phone launcher)
        run: |
          cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.phone.backup.xml
          cp android/app/src/main/AndroidManifest.tv.xml android/app/src/main/AndroidManifest.xml

      - name: Build TV APK (arm64-v8a only — Xiaomi Mi Box, Chromecast GTV, Sony 2018+, Nvidia Shield)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Rename output
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV.apk
          if-no-files-found: error

      - name: Build TV DEBUG APK (arm64-v8a — muestra pantalla roja con stack trace si crashea)
        run: flutter build apk --debug --target-platform=android-arm64

      - name: Rename debug output
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG.apk

      - name: Upload TV DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-DEBUG-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG.apk
          if-no-files-found: error
