name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Release + Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build RELEASE APK universal (arm + arm64 + x86_64 — cubre móviles, TV boxes, Fire Stick y Android TV)
        run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
