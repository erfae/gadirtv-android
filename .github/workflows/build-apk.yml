name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Release + Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build DEBUG APK
        run: flutter build apk --debug

      - name: Build RELEASE APK (universal + per-ABI splits)
        run: flutter build apk --release --split-per-abi

      - name: Upload DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-debug-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: Upload RELEASE APKs
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-apks
          path: gadirtv_android/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
