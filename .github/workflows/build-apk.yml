name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release + Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Restore minimal GeneratedPluginRegistrant (pub get rewrites it with libVLC)
        run: git checkout HEAD -- android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Verify deferred plugin registration (no VLC at cold start)
        run: |
          grep -q GadirPluginRegistrant android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt
          if grep -q 'provideFlutterEngine' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: use default FlutterActivity engine for reliable TV DPAD keys"
            exit 1
          fi
          if grep -qE '^import .*FlutterVlcPlayerPlugin' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: MainActivity must not import FlutterVlcPlayerPlugin directly"
            exit 1
          fi
          if grep -q 'fluttervlcplayer' android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java; then
            echo "ERROR: GeneratedPluginRegistrant must not register libVLC at cold start"
            exit 1
          fi
          if grep -q 'GeneratedPluginRegistrant.registerWith' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: MainActivity must not call GeneratedPluginRegistrant"
            exit 1
          fi

      - name: Build RELEASE APKs (uno por arquitectura — más pequeños, más fiables)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64,android-x64

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-split-apks
          path: gadirtv_android/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Build RELEASE APK universal (fallback si prefieres uno solo)
        run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-release-apk
          path: gadirtv_android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-tv:
    name: Build APK Android TV / Google TV (dedicado)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk/21*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/22*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/23*
          df -h /

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore minimal GeneratedPluginRegistrant (pub get rewrites it with libVLC)
        run: git checkout HEAD -- android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Verify deferred plugin registration (no VLC at cold start)
        run: |
          grep -q GadirPluginRegistrant android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt
          if grep -q 'provideFlutterEngine' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: use default FlutterActivity engine for reliable TV DPAD keys"
            exit 1
          fi
          if grep -qE '^import .*FlutterVlcPlayerPlugin' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: MainActivity must not import FlutterVlcPlayerPlugin directly"
            exit 1
          fi
          if grep -q 'fluttervlcplayer' android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java; then
            echo "ERROR: GeneratedPluginRegistrant must not register libVLC at cold start"
            exit 1
          fi
          if grep -q 'GeneratedPluginRegistrant.registerWith' android/app/src/main/kotlin/com/gadir/tv/MainActivity.kt; then
            echo "ERROR: MainActivity must not call GeneratedPluginRegistrant"
            exit 1
          fi

      # La mayoría de Android TV / TV Box (Xiaomi, ONN, Hisense, Chromecast…)
      # ejecutan Android en modo 32-bit (armeabi-v7a) aunque el chip sea 64-bit.
      # Solo Nvidia Shield y pocos modelos usan arm64 de verdad. Por eso generamos
      # SIEMPRE el APK 32-bit además del 64-bit.

      - name: Build TV APK 32-bit (armeabi-v7a — PRUEBA ESTE PRIMERO EN TV)
        run: flutter build apk --release --target-platform=android-arm

      - name: Rename 32-bit output
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-armv7a.apk

      - name: Upload TV APK 32-bit
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-armv7a
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-armv7a.apk
          if-no-files-found: error

      - name: Build TV APK 64-bit (arm64-v8a — solo Shield y TVs 64-bit reales)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Rename 64-bit output
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-arm64.apk

      - name: Upload TV APK 64-bit
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-arm64
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-arm64.apk
          if-no-files-found: error

      - name: Build TV APK universal (arm32 + arm64 en un solo archivo)
        run: flutter build apk --release --target-platform=android-arm,android-arm64

      - name: Rename universal output
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-universal.apk

      - name: Upload TV APK universal
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-universal
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-universal.apk
          if-no-files-found: error

      - name: Build TV DEBUG APK 32-bit (stack trace si crashea al abrir)
        run: flutter build apk --debug --target-platform=android-arm

      - name: Rename debug output
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG-armv7a.apk

      - name: Upload TV DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-AndroidTV-DEBUG-armv7a
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-AndroidTV-DEBUG-armv7a.apk
          if-no-files-found: error

      # Android Studio emulator (x86_64) — los APK TV arm NO arrancan aquí.
      - name: Build EMULATOR APK x64 release (Android Studio)
        run: GTV_EMULATOR_BUILD=true flutter build apk --release --target-platform=android-x64

      - name: Rename emulator x64 release
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/GadirTV-emulator-x64-release.apk

      - name: Upload emulator x64 release
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-emulator-x64-release
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-emulator-x64-release.apk
          if-no-files-found: error

      - name: Build EMULATOR APK x64 debug (Android Studio)
        run: GTV_EMULATOR_BUILD=true flutter build apk --debug --target-platform=android-x64

      - name: Rename emulator x64 debug
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/GadirTV-emulator-x64-debug.apk

      - name: Upload emulator x64 debug
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-emulator-x64-debug
          path: gadirtv_android/build/app/outputs/flutter-apk/GadirTV-emulator-x64-debug.apk
          if-no-files-found: error

  # Public GitHub Release so Android TV users can paste a direct URL into
  # the Downloader app (artifact zips from Actions are not usable there).
  publish-release:
    name: Publish GitHub Release (Downloader-friendly URL)
    needs: [build, build-tv]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from pubspec.yaml
        id: ver
        run: |
          V=$(grep '^version:' gadirtv_android/pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Download TV APK 32-bit
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-AndroidTV-armv7a
          path: release-assets

      - name: Download TV APK 64-bit
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-AndroidTV-arm64
          path: release-assets

      - name: Download TV APK universal
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-AndroidTV-universal
          path: release-assets

      - name: Download universal APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-release-apk
          path: release-assets

      - name: Download arm64 phone APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-release-split-apks
          path: release-assets

      - name: Download TV DEBUG APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-AndroidTV-DEBUG-armv7a
          path: release-assets

      - name: Download emulator x64 release
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-emulator-x64-release
          path: release-assets

      - name: Download emulator x64 debug
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-emulator-x64-debug
          path: release-assets

      - name: Prepare release filenames
        run: |
          cd release-assets
          [ -f GadirTV-AndroidTV-armv7a.apk ] && cp GadirTV-AndroidTV-armv7a.apk GadirTV-AndroidTV.apk
          [ -f app-release.apk ] && mv app-release.apk GadirTV-universal-phone.apk
          [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk GadirTV-arm64.apk
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: GadirTV ${{ steps.ver.outputs.version }}
          body: |
            ## Instalar con Downloader (Android TV / TV Box)

            1. Abre **Downloader** en tu TV
            2. Pega esta URL y pulsa **Go**:

            ```
            https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/GadirTV-AndroidTV.apk
            ```

            3. Cuando termine la descarga → **Install**
            4. En login debe aparecer **v${{ steps.ver.outputs.version }}**

            ## Otros APKs

            | Archivo | Dispositivo |
            |---------|-------------|
            | `GadirTV-AndroidTV.apk` | TV Box 32-bit (prueba este primero) |
            | `GadirTV-AndroidTV-arm64.apk` | Shield y TVs 64-bit |
            | `GadirTV-AndroidTV-universal.apk` | Cualquier TV (más pesado) |
            | `GadirTV-arm64.apk` | Móvil/tablet arm64 |
            | `GadirTV-universal-phone.apk` | Cualquier Android (más pesado) |
            | `GadirTV-AndroidTV-DEBUG-armv7a.apk` | Si crashea en TV — muestra error en pantalla roja |
            | `GadirTV-emulator-x64-release.apk` | **Emulador Android Studio x86_64 (recomendado)** |
            | `GadirTV-emulator-x64-debug.apk` | Emulador x86_64 debug (más lento al arrancar) |

            > **Emulador:** no uses `GadirTV-AndroidTV.apk` en Android Studio — es ARM y no arranca.
            > Instala `GadirTV-emulator-x64-release.apk`.
          files: release-assets/*
          make_latest: true
          overwrite_files: true
