name: Build GadirTV Native APK

on:
  push:
    branches: [main, master]
    paths:
      - 'gadirtv_native/**'
      - '.github/workflows/build-native-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: Build Native Android TV APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gadirtv_native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$APK" ]; then echo "No APK found"; find app/build -name '*.apk'; exit 1; fi
          cp "$APK" GadirTV-Native-AndroidTV.apk
          ls -la GadirTV-Native-AndroidTV.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GadirTV-Native-AndroidTV
          path: gadirtv_native/GadirTV-Native-AndroidTV.apk
          if-no-files-found: error

  publish-native-release:
    name: Publish Native GitHub Release
    needs: [build-native]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: GadirTV-Native-AndroidTV
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: native-v3.0.0
          name: GadirTV Native 3.0.0 (Fase 1)
          body: |
            ## GadirTV Nativo — Fase 1

            App Android nativa (Kotlin + ExoPlayer Media3). Coexiste con la versión Flutter.

            - Login Xtream con scroll
            - Categorías y canales con scroll nativo (RecyclerView)
            - Mini preview + pantalla completa ExoPlayer
            - Mismo OkHttp que la app Flutter

            ```
            https://github.com/${{ github.repository }}/releases/download/native-v3.0.0/GadirTV-Native-AndroidTV.apk
            ```

            **Package:** `com.gadir.tv.native` (se instala junto a la app Flutter)
          files: release-assets/*
          make_latest: false
          overwrite_files: true
